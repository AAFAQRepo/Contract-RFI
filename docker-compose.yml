version: "3.9"

services:
  # Infrastructure
  postgres:
    image: postgres:15
    container_name: contract_rfi_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contract_rfi}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-contract_rfi}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: contract_rfi_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: contract_rfi_qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: contract_rfi_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5

  tei-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    container_name: contract_rfi_tei
    command: --model-id Alibaba-NLP/gte-multilingual-base --port 80 --max-batch-tokens 16384 --max-client-batch-size 1024
    environment:
      - PORT=80
    volumes:
      - /home/ubuntu/.cache/huggingface:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 30s

  # Application Services
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contract_rfi_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      tei-embeddings:
        condition: service_healthy
      ocr-service:
        condition: service_started
    env_file:
      - .env
    environment:
      - EMBEDDING_SERVICE_URL=http://tei-embeddings:80
      - OCR_SERVICE_URL=http://ocr-service:8001
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /home/ubuntu/.cache/huggingface:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: contract_rfi_frontend
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contract_rfi_worker
    restart: always
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=8
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tei-embeddings:
        condition: service_healthy
      ocr-service:
        condition: service_started
    env_file:
      - .env
    environment:
      - EMBEDDING_SERVICE_URL=http://tei-embeddings:80
      - OCR_SERVICE_URL=http://ocr-service:8001
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - /home/ubuntu/.cache/huggingface:/root/.cache/huggingface
    # CPU-only worker (lightweight)

  ocr-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contract_rfi_ocr
    restart: always
    command: python -m backend.ocr_service.main
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - .env
    volumes:
      - /home/ubuntu/.cache/huggingface:/root/.cache/huggingface
      - /home/ubuntu/.cache/docling:/root/.cache/docling
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contract_rfi_beat
    restart: always
    command: celery -A workers.celery_app beat --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env

volumes:
  pgdata:
  qdrant_data:
  minio_data:
  model_cache:
